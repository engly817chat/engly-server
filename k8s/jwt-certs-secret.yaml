apiVersion: v1
kind: Secret
metadata:
  name: jwt-certs
  namespace: engly
type: Opaque
data:
  # JWT RSA Certificate files (base64 encoded)
  # To populate these, run the following commands:
  # base64 -w 0 src/main/resources/certs/privateKey.pem
  # base64 -w 0 src/main/resources/certs/publicKey.pem
  privateKey.pem: ""  # Add base64 encoded content of privateKey.pem
  publicKey.pem: ""   # Add base64 encoded content of publicKey.pem

