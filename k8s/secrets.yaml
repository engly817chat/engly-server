apiVersion: v1
kind: Secret
metadata:
  name: engly-secrets
  namespace: engly
type: Opaque
data:
  # Database credentials (base64 encoded)
  DB_NAME: ZW5nbHk=  # engly
  DB_USER: ZW5nbHl1c2Vy  # englyuser
  DB_PASSWORD: cGFzc3dvcmQ=  # password - CHANGE THIS

  # Google OAuth credentials (from security.yml)
  CLIENT_ID: ""  # Add your base64 encoded Google OAuth client ID
  CLIENT_SECRET: ""  # Add your base64 encoded Google OAuth client secret

  # Email configuration (from security.yml)
  ENGLY_EMAIL: ""  # Add your base64 encoded Gmail address
  ENGLY_EMAIL_PASSWORD: ""  # Add your base64 encoded Gmail app password

  # Admin configuration (from application.properties)
  ADMIN_PASSWORD: YWRtaW5wYXNz  # adminpass - CHANGE THIS
  SYS_EMAIL: ""  # Add your base64 encoded system admin email
  DEV_EMAIL: ""  # Add your base64 encoded developer email

  # Google Drive configuration (from application.properties)
  GOOGLE_DRIVE_REFRESH_TOKEN: ""  # Add your base64 encoded Google Drive refresh token
  GOOGLE_DRIVE_FOLDER_ID: ""  # Add your base64 encoded Google Drive folder ID
  GOOGLE_DRIVE_CLIENT_ID: ""  # Add your base64 encoded Google Drive client ID
  GOOGLE_DRIVE_CLIENT_SECRET: ""  # Add your base64 encoded Google Drive client secret

  # JWT RSA Keys - You'll need to base64 encode your actual key files
  JWT_RSA_PRIVATE_KEY: ""  # Base64 encoded content of src/main/resources/certs/privateKey.pem
  JWT_RSA_PUBLIC_KEY: ""   # Base64 encoded content of src/main/resources/certs/publicKey.pem

