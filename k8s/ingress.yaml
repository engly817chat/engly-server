apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: engly-ingress
  namespace: engly
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"  # Match your MAX_FILE_SIZE
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "20"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost:3000"  # Update with your frontend URL
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    # Rate limiting based on your resilience4j configuration
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  rules:
  - host: engly.local  # Update with your domain
    http:
      paths:
      # Main application endpoints
      - path: /
        pathType: Prefix
        backend:
          service:
            name: engly-service
            port:
              number: 8000

      # Actuator endpoints for monitoring (from monitoring.yml)
      - path: /actuator
        pathType: Prefix
        backend:
          service:
            name: engly-service
            port:
              number: 8000

      # OAuth2 endpoints (from security.yml)
      - path: /login/oauth2
        pathType: Prefix
        backend:
          service:
            name: engly-service
            port:
              number: 8000

      # API endpoints (assuming REST API structure)
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: engly-service
            port:
              number: 8000

      # Swagger/OpenAPI documentation (from monitoring.yml)
      - path: /swagger-ui
        pathType: Prefix
        backend:
          service:
            name: engly-service
            port:
              number: 8000
      - path: /v3/api-docs
        pathType: Prefix
        backend:
          service:
            name: engly-service
            port:
              number: 8000

  # Uncomment for TLS/SSL in production
  # tls:
  # - hosts:
  #   - engly.local
  #   secretName: engly-tls

